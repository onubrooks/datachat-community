# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install --group dev

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Lint DataPoint contracts
        run: |
          python scripts/lint_datapoints.py --path datapoints/examples --recursive

      - name: Test with pytest
        run: |
          pytest

      - name: Phase 1 KPI gate (CI)
        run: |
          python scripts/phase1_kpi_gate.py \
            --mode ci \
            --report-json reports/phase1_ci_gate.json \
            --report-md reports/phase1_ci_gate.md

      - name: Upload Phase 1 KPI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-kpi-ci-report
          path: |
            reports/phase1_ci_gate.json
            reports/phase1_ci_gate.md

  smoke-e2e-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: postgresql
          - engine: mysql
          - engine: clickhouse

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ github.run_id }}${{ github.run_attempt }}
        ports:
          - 3306:3306
      clickhouse:
        image: clickhouse/clickhouse-server:25.4
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ${{ github.run_id }}${{ github.run_attempt }}
        ports:
          - 8123:8123
          - 9000:9000

    env:
      SMOKE_ENGINE: ${{ matrix.engine }}
      MYSQL_ROOT_PASSWORD: ${{ github.run_id }}${{ github.run_attempt }}
      CLICKHOUSE_PASSWORD: ${{ github.run_id }}${{ github.run_attempt }}
      LLM_DEFAULT_PROVIDER: local
      LLM_REQUIRE_PROVIDER_KEYS_ON_STARTUP: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install --group dev

      - name: Wait for service ports
        run: |
          python - <<'PY'
          import socket
          import time

          ports = [5432, 3306, 8123]
          for port in ports:
              connected = False
              for _ in range(90):
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(1.0)
                  try:
                      sock.connect(("127.0.0.1", port))
                      connected = True
                      break
                  except OSError:
                      time.sleep(1)
                  finally:
                      sock.close()
              if not connected:
                  raise SystemExit(f"Port {port} did not become ready in time")
          print("Service ports are reachable.")
          PY

      - name: Prepare smoke runtime env
        run: |
          python - <<'PY'
          import base64
          import os

          engine = os.environ["SMOKE_ENGINE"].strip().lower()
          mysql_password = os.environ["MYSQL_ROOT_PASSWORD"]
          clickhouse_password = os.environ["CLICKHOUSE_PASSWORD"]

          if engine == "postgresql":
              target_url = "postgresql://postgres@127.0.0.1:5432/datachat_target_pg"
          elif engine == "mysql":
              target_url = f"mysql://root:{mysql_password}@127.0.0.1:3306/datachat_target_mysql"
          elif engine == "clickhouse":
              target_url = (
                  f"clickhouse://default:{clickhouse_password}@127.0.0.1:8123/datachat_target_ch"
              )
          else:
              raise SystemExit(f"Unsupported SMOKE_ENGINE: {engine}")

          # Fernet-compatible key (urlsafe base64-encoded 32 random bytes).
          credentials_key = base64.urlsafe_b64encode(os.urandom(32)).decode("utf-8")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"SMOKE_TARGET_DATABASE_URL={target_url}\n")
              handle.write("SYSTEM_DATABASE_URL=postgresql://postgres@127.0.0.1:5432/datachat_system\n")
              handle.write(f"DATABASE_CREDENTIALS_KEY={credentials_key}\n")
          PY

      - name: Run smoke E2E integration
        run: |
          pytest tests/integration/test_smoke_e2e.py --run-integration -m integration
